<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致最特别的康胜胜</title>
    <style>
        :root {
            --primary: #ff69b4;
            --secondary: #a18cd1;
            --accent: #ffd700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #fff;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 通用组件 --- */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 90%;
            width: 450px;
            text-align: center;
            margin: 20px;
            position: relative;
            z-index: 10;
        }

        .btn {
            background: linear-gradient(to right, #ff69b4, #ff8e8e);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255,105,180,0.4);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* --- 1. 解锁界面 --- */
        #step-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .input-box {
            width: 100%; padding: 15px; margin: 15px 0;
            border: 2px solid #eee; border-radius: 12px;
            font-size: 1.2rem; text-align: center; outline: none;
        }
        .input-box:focus { border-color: var(--primary); }

        /* --- 2. 蛋糕互动 --- */
        .cake-container {
            position: relative; width: 200px; height: 200px; margin: 20px auto; cursor: pointer;
        }
        .candle {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 50px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff69b4 5px, #ff69b4 10px);
            border-radius: 4px; z-index: 2;
        }
        .flame {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 24px; background: #ffeb3b;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff9800;
            animation: flicker 0.1s infinite alternate;
            transform-origin: bottom center;
        }
        .flame.out { display: none; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.1); } }
        .cake-base {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 180px; height: 100px;
            background: linear-gradient(to bottom, #f8a5c2, #e75480);
            border-radius: 10px 10px 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- 3. 幸运抽签 (新样式) --- */
        .lucky-boxes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .lucky-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, background 0.3s;
            animation: float 3s ease-in-out infinite;
        }
        .lucky-box:hover {
            transform: scale(1.1) rotate(5deg);
            background: linear-gradient(135deg, #ff69b4, #ff8e8e);
        }
        .lucky-box.opened {
            background: #eee;
            cursor: default;
            animation: none;
            transform: scale(0.9);
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .lucky-result-text {
            font-size: 1.2rem;
            color: #333;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            border: 2px dashed var(--primary);
        }

        /* --- 4. 游戏环节 --- */
        .game-area {
            position: relative; width: 320px; height: 400px;
            background: rgba(255,255,255,0.8);
            margin: 20px auto; border-radius: 15px;
            overflow: hidden; border: 4px solid #fff;
            touch-action: none;
        }
        .player {
            position: absolute; bottom: 10px; font-size: 2.5rem;
            transform: translateX(-50%); z-index: 10;
        }
        .gift-item {
            position: absolute; font-size: 1.8rem; z-index: 5;
        }
        .game-stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }

        /* --- 5. 真心话轮盘 --- */
        .wheel-container {
            position: relative; width: 250px; height: 250px; margin: 20px auto;
        }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(
                    #ff69b4 0deg 60deg,
                    #a18cd1 60deg 120deg,
                    #ffd700 120deg 180deg,
                    #23a6d5 180deg 240deg,
                    #23d5ab 240deg 300deg,
                    #ff8e8e 300deg 360deg
            );
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #333;
            z-index: 5;
        }
        .wheel-result {
            margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #333;
            min-height: 1.5em;
        }

        /* --- 6. 最终礼物 --- */
        #final-gift-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 9999;
            display: none;
            justify-content: center; align-items: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }
        #final-gift-modal.show {
            opacity: 1;
            pointer-events: auto;
            display: flex !important;
        }
        .gift-img {
            max-width: 90%;
            max-height: 60vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 8px solid #fff;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #f9f9f9;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
            object-fit: contain;
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 烟花 Canvas */
        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; }

        /* 飘落物 */
        .falling-item { position: absolute; top: -50px; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .step-title { font-size: 1.5rem; color: var(--primary); margin-bottom: 15px; font-weight: bold; }
        .step-desc { color: #666; margin-bottom: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<!-- 步骤 1: 解锁 -->
<div id="step-lock" class="fade-in">
    <div class="card">
        <h2 class="step-title">🔒 专属秘密基地</h2>
        <p class="step-desc">康胜胜，请输入密码开启你的生日旅程<br><small>(提示：你的生日，三位数字)</small></p>
        <input type="password" id="passwordInput" class="input-box" placeholder="输入密码...">
        <button class="btn" onclick="checkPassword()">开启旅程</button>
        <p id="lock-error" style="color:red; margin-top:10px; display:none;">密码不对哦，再想想？💕</p>
    </div>
</div>

<!-- 步骤 2: 吹蜡烛 -->
<div id="step-cake" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card">
        <h2 class="step-title">🎂 许个愿吧</h2>
        <p class="step-desc">闭上眼睛，在心里默念一个愿望，然后点击火焰吹灭它！</p>
        <div class="cake-container" onclick="blowCandle()">
            <div class="cake-base"></div>
            <div class="candle"><div class="flame" id="flame"></div></div>
        </div>
        <p id="wish-text" class="hidden" style="color:var(--primary); font-weight:bold; margin-top:20px;">✨ 愿望已送达！接下来试试手气吧 ✨</p>
        <button id="cake-btn" class="btn hidden" onclick="nextStep('step-lucky')">开始挑战</button>
    </div>
</div>

<!-- 步骤 3: 幸运大抽签 (已替换) -->
<div id="step-lucky" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card">
        <h2 class="step-title">🎁 幸运大抽签</h2>
        <p class="step-desc">凭直觉选一个盲盒，看看今天有什么好运等着你！</p>

        <div class="lucky-boxes">
            <div class="lucky-box" onclick="openBox(0)" id="box-0">🎁</div>
            <div class="lucky-box" onclick="openBox(1)" id="box-1">🎁</div>
            <div class="lucky-box" onclick="openBox(2)" id="box-2">🎁</div>
        </div>

        <div id="lucky-display" class="lucky-result-text hidden">
            <!-- 结果将显示在这里 -->
        </div>

        <button id="lucky-next-btn" class="btn hidden" onclick="nextStep('step-game')">进入下一关</button>
    </div>
</div>

<!-- 步骤 4: 接礼物游戏 -->
<div id="step-game" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card" style="padding:15px;">
        <h2 class="step-title">🎮 收集幸运礼物</h2>
        <p class="step-desc" style="font-size:0.9rem;">接住 10 个礼物解锁下一关！(← → 或滑动)</p>
        <div class="game-stats">
            <span>时间: <span id="timer">30</span>s</span>
            <span>得分: <span id="score">0</span>/10</span>
        </div>
        <div class="game-area" id="game-container">
            <div class="player" id="player">❤️</div>
        </div>
        <button id="game-start-btn" class="btn" onclick="startGame()">开始挑战</button>
    </div>
</div>

<!-- 步骤 5: 真心话轮盘 -->
<div id="step-wheel" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card">
        <h2 class="step-title">🎡 幸运大轮盘</h2>
        <p class="step-desc">转动轮盘，抽取董世帅给你的专属祝福/承诺！</p>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel"></div>
        </div>
        <div class="wheel-result" id="wheel-result"></div>
        <button id="wheel-btn" class="btn" onclick="spinWheel()">转动幸运</button>
        <button id="final-btn" class="btn hidden" onclick="showFinalGift()">🎁 领取最终大奖</button>
    </div>
</div>

<!-- 步骤 6: 最终礼物 -->
<div id="final-gift-modal">
    <h1 style="color:var(--primary); margin-bottom:20px; font-size:2.5rem; text-align:center; padding:0 20px;">生日快乐，康胜胜！</h1>
    <img src="gift.jpg" alt="专属礼物" class="gift-img" id="final-image">
    <p style="margin-top:30px; font-size:1.2rem; color:#555; max-width:600px; text-align:center; padding:0 20px;" id="final-message"></p>
    <button class="btn" onclick="location.reload()" style="margin-top:30px; background:#333;">再玩一次</button>
</div>

<script>
    // ================= 配置区域 =================
    const CONFIG = {
        password: "115",
        giftImage: "lankou.png", // 确保图片和html在同一目录
        finalMessage: "这份礼物代表我的心意，很高兴能陪你度过这个特别的日子，祝你生日快乐！—— 董世帅",

        // 【新配置】幸运签文内容 (可以随意修改)
        luckyPrizes: [
            "✨ 超级好运：今天会发生一件让你开心的小事！",
            "🍔 美食特权：今晚必须吃点好吃的，犒劳一下自己！",
            "😄 开心任务：对着镜子笑一个，烦恼全消！",
            "🌟 真诚赞美：你今天的发型/衣服一定很好看！",
            "🍀 幸运加持：接下来的一周都会顺顺利利！",
            "🎵 音乐时刻：去听一首你最喜欢的歌吧！"
        ],

        quizzes: [], // 旧配置已移除，不再需要

        wheelPrizes: [
            "一次愉快的周末约饭券",
            "专属树洞倾听服务",
            "奶茶/咖啡报销券",
            "随叫随到帮忙办事",
            "推荐一部好电影并陪聊",
            "真诚的祝福：天天开心"
        ]
    };
    // =======================================================

    function nextStep(stepId) {
        document.querySelectorAll('body > div:not(#fireworks)').forEach(el => el.classList.add('hidden'));
        const target = document.getElementById(stepId);
        target.classList.remove('hidden');
        target.style.display = 'flex';

        if(stepId === 'step-lock') {
            document.getElementById('step-lock').style.position = 'fixed';
        } else {
            document.getElementById('step-lock').style.position = 'absolute';
        }
    }

    // 1. 解锁
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === CONFIG.password) {
            nextStep('step-cake');
            startFallingItems('❤️');
        } else {
            const err = document.getElementById('lock-error');
            err.style.display = 'block';
            document.querySelector('#step-lock .card').animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(10px)' },
                { transform: 'translateX(0)' }
            ], { duration: 400 });
        }
    }
    document.getElementById('passwordInput').addEventListener('keypress', e => { if(e.key==='Enter') checkPassword(); });

    // 2. 吹蜡烛
    function blowCandle() {
        const flame = document.getElementById('flame');
        if (!flame.classList.contains('out')) {
            flame.classList.add('out');
            document.getElementById('wish-text').classList.remove('hidden');
            document.getElementById('cake-btn').classList.remove('hidden');
            createFireworks(10);
        }
    }

    // 3. 幸运抽签逻辑 (新功能)
    let hasPicked = false;
    function openBox(index) {
        if (hasPicked) return; // 只能选一次
        hasPicked = true;

        // 1. 关闭所有盒子动画，标记为已打开
        for(let i=0; i<3; i++) {
            const box = document.getElementById(`box-${i}`);
            box.classList.add('opened');
            if(i !== index) {
                box.innerText = '😢'; // 没选中的显示遗憾表情
                box.style.background = '#ddd';
            } else {
                box.innerText = '🎉'; // 选中的显示庆祝表情
            }
        }

        // 2. 随机抽取一个签文
        const randomText = CONFIG.luckyPrizes[Math.floor(Math.random() * CONFIG.luckyPrizes.length)];

        // 3. 显示结果
        const display = document.getElementById('lucky-display');
        display.innerText = randomText;
        display.classList.remove('hidden');

        // 4. 显示下一步按钮
        document.getElementById('lucky-next-btn').classList.remove('hidden');

        // 5. 放个小烟花
        createFireworks(20);
    }

    // 4. 游戏逻辑
    let gameActive = false, score = 0, timeLeft = 30, spawnId;
    let playerPos = 160;
    const gameContainer = document.getElementById('game-container');
    const player = document.getElementById('player');

    function startGame() {
        if (gameActive) return;
        gameActive = true;
        score = 0;
        timeLeft = 30;
        playerPos = 160;
        document.getElementById('score').innerText = '0';
        document.getElementById('timer').innerText = '30';
        document.getElementById('game-start-btn').disabled = true;
        document.getElementById('game-start-btn').innerText = "游戏中...";

        document.querySelectorAll('.gift-item').forEach(e => e.remove());

        const movePlayer = (x) => {
            playerPos = Math.max(20, Math.min(300, x));
            player.style.left = playerPos + 'px';
        };

        document.onkeydown = (e) => {
            if(!gameActive) return;
            if(e.key === 'ArrowLeft') movePlayer(playerPos - 20);
            if(e.key === 'ArrowRight') movePlayer(playerPos + 20);
        };

        gameContainer.ontouchmove = (e) => {
            if(!gameActive) return;
            e.preventDefault();
            const rect = gameContainer.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            movePlayer(x);
        };

        spawnId = setInterval(() => {
            if(!gameActive) return;
            const gift = document.createElement('div');
            gift.className = 'gift-item';
            gift.innerText = '🎁';
            gift.style.left = Math.random() * 280 + 20 + 'px';
            gift.style.top = '-30px';
            gameContainer.appendChild(gift);

            let top = -30;
            const speed = 3 + Math.random() * 2;

            const drop = () => {
                if(!gameActive) return;
                top += speed;
                gift.style.top = top + 'px';

                const pRect = player.getBoundingClientRect();
                const gRect = gift.getBoundingClientRect();

                if (top > 350) {
                    gift.remove();
                } else if (
                    gRect.bottom >= pRect.top + 10 &&
                    gRect.right >= pRect.left + 10 &&
                    gRect.left <= pRect.right - 10
                ) {
                    score++;
                    document.getElementById('score').innerText = score;
                    gift.remove();
                    if(score >= 10) endGame(true);
                } else {
                    requestAnimationFrame(drop);
                }
            };
            requestAnimationFrame(drop);
        }, 800);

        const timerInt = setInterval(() => {
            if(!gameActive) { clearInterval(timerInt); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(win) {
        gameActive = false;
        clearInterval(spawnId);
        document.onkeydown = null;
        gameContainer.ontouchmove = null;
        document.getElementById('game-start-btn').disabled = false;
        document.getElementById('game-start-btn').innerText = win ? "挑战成功!" : "再试一次";

        if(win) {
            createFireworks(30);
            setTimeout(() => nextStep('step-wheel'), 1500);
        } else {
            alert("时间到啦！没关系，再试一次就能通过~");
        }
    }

    // 5. 轮盘逻辑
    let wheelRotated = false;
    function spinWheel() {
        if(wheelRotated) return;
        wheelRotated = true;
        const wheel = document.getElementById('wheel');
        const randomDeg = 1800 + Math.random() * 360;
        wheel.style.transform = `rotate(${randomDeg}deg)`;

        setTimeout(() => {
            const actualDeg = randomDeg % 360;
            const index = Math.floor(((360 - actualDeg + 30) % 360) / 60);
            const prize = CONFIG.wheelPrizes[index];

            document.getElementById('wheel-result').innerText = "🎉 获得：" + prize;
            document.getElementById('wheel-btn').classList.add('hidden');
            document.getElementById('final-btn').classList.remove('hidden');
            createFireworks(50);
        }, 4000);
    }

    // 6. 最终礼物
    function showFinalGift() {
        const modal = document.getElementById('final-gift-modal');
        const img = document.getElementById('final-image');

        img.src = CONFIG.giftImage;
        img.alt = "正在加载您的专属礼物...";

        document.getElementById('final-message').innerText = CONFIG.finalMessage;

        modal.style.display = 'flex';
        setTimeout(() => {
            modal.classList.add('show');
        }, 50);

        startFallingItems('🎉');
        setInterval(createFireworks, 800);
    }

    // --- 特效工具 ---
    function startFallingItems(emoji) {
        setInterval(() => {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = 'falling-item';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = Math.random() * 20 + 10 + 'px';
            el.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }, 300);
    }

    // 简易烟花系统
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    function createFireworks(count = 30) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height / 2;
        const colors = ['#ff69b4', '#ffd700', '#00ffff', '#ff0000', '#ffffff'];

        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 100,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
    }

    function animateFireworks() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let i=particles.length-1; i>=0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            p.life--;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 100;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
            ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(animateFireworks);
    }
    animateFireworks();
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

</script>
</body>
</html>
