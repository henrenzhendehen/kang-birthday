<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致最特别的康胜胜</title>
    <style>
        :root {
            --primary: #ff69b4;
            --secondary: #a18cd1;
            --accent: #ffd700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #fff;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 通用组件 --- */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 90%;
            width: 450px;
            text-align: center;
            margin: 20px;
            position: relative;
            z-index: 10;
        }

        .btn {
            background: linear-gradient(to right, #ff69b4, #ff8e8e);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255,105,180,0.4);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* --- 1. 解锁界面 --- */
        #step-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .input-box {
            width: 100%; padding: 15px; margin: 15px 0;
            border: 2px solid #eee; border-radius: 12px;
            font-size: 1.2rem; text-align: center; outline: none;
        }
        .input-box:focus { border-color: var(--primary); }

        /* --- 2. 蛋糕互动 --- */
        .cake-container {
            position: relative; width: 200px; height: 200px; margin: 20px auto; cursor: pointer;
        }
        .candle {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 50px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff69b4 5px, #ff69b4 10px);
            border-radius: 4px; z-index: 2;
        }
        .flame {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 24px; background: #ffeb3b;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff9800;
            animation: flicker 0.1s infinite alternate;
            transform-origin: bottom center;
        }
        .flame.out { display: none; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.1); } }
        .cake-base {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 180px; height: 100px;
            background: linear-gradient(to bottom, #f8a5c2, #e75480);
            border-radius: 10px 10px 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- 3. 问答环节 --- */
        .quiz-option {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            background: #f0f0f0; border: 2px solid transparent;
            border-radius: 10px; cursor: pointer; transition: all 0.3s;
            font-size: 1rem; color: #333;
        }
        .quiz-option:hover { background: #e0e0e0; }
        .quiz-option.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .quiz-option.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        /* --- 4. 游戏环节 --- */
        .game-area {
            position: relative; width: 320px; height: 400px;
            background: rgba(255,255,255,0.8);
            margin: 20px auto; border-radius: 15px;
            overflow: hidden; border: 4px solid #fff;
            touch-action: none;
        }
        .player {
            position: absolute; bottom: 10px; font-size: 2.5rem;
            transform: translateX(-50%); z-index: 10;
        }
        .gift-item {
            position: absolute; font-size: 1.8rem; z-index: 5;
        }
        .game-stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }

        /* --- 5. 真心话轮盘 --- */
        .wheel-container {
            position: relative; width: 250px; height: 250px; margin: 20px auto;
        }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(
                    #ff69b4 0deg 60deg,
                    #a18cd1 60deg 120deg,
                    #ffd700 120deg 180deg,
                    #23a6d5 180deg 240deg,
                    #23d5ab 240deg 300deg,
                    #ff8e8e 300deg 360deg
            );
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #333;
            z-index: 5;
        }
        .wheel-result {
            margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #333;
            min-height: 1.5em;
        }

        /* --- 6. 最终礼物 --- */
        #final-gift-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 1s;
        }
        #final-gift-modal.show { opacity: 1; pointer-events: auto; }
        .gift-img {
            max-width: 90%; max-height: 60vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 8px solid #fff;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 烟花 Canvas */
        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; }

        /* 飘落物 */
        .falling-item { position: absolute; top: -50px; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .step-title { font-size: 1.5rem; color: var(--primary); margin-bottom: 15px; font-weight: bold; }
        .step-desc { color: #666; margin-bottom: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<!-- 步骤 1: 解锁 -->
<div id="step-lock" class="fade-in">
    <div class="card">
        <h2 class="step-title">🔒 专属秘密基地</h2>
        <p class="step-desc">康胜胜，请输入密码开启你的生日旅程<br><small>(提示：我们的特殊数字)</small></p>
        <input type="password" id="passwordInput" class="input-box" placeholder="输入密码...">
        <button class="btn" onclick="checkPassword()">开启旅程</button>
        <p id="lock-error" style="color:red; margin-top:10px; display:none;">密码不对哦，再想想？💕</p>
    </div>
</div>

<!-- 步骤 2: 吹蜡烛 -->
<div id="step-cake" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card">
        <h2 class="step-title">🎂 许个愿吧</h2>
        <p class="step-desc">闭上眼睛，在心里默念一个愿望，然后点击火焰吹灭它！</p>
        <div class="cake-container" onclick="blowCandle()">
            <div class="cake-base"></div>
            <div class="candle"><div class="flame" id="flame"></div></div>
        </div>
        <p id="wish-text" class="hidden" style="color:var(--primary); font-weight:bold; margin-top:20px;">✨ 愿望已送达！接下来接受挑战吧 ✨</p>
        <button id="cake-btn" class="btn hidden" onclick="nextStep('step-quiz')">开始挑战</button>
    </div>
</div>

<!-- 步骤 3: 爱的问答 -->
<div id="step-quiz" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card">
        <h2 class="step-title">🧠 爱的默契大考验</h2>
        <p class="step-desc" id="quiz-question">加载中...</p>
        <div id="quiz-options"></div>
        <p id="quiz-feedback" style="margin-top:15px; font-weight:bold;"></p>
    </div>
</div>

<!-- 步骤 4: 接礼物游戏 -->
<div id="step-game" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card" style="padding:15px;">
        <h2 class="step-title">🎮 收集爱心礼物</h2>
        <p class="step-desc" style="font-size:0.9rem;">接住 10 个礼物解锁下一关！(← → 或滑动)</p>
        <div class="game-stats">
            <span>时间: <span id="timer">30</span>s</span>
            <span>得分: <span id="score">0</span>/10</span>
        </div>
        <div class="game-area" id="game-container">
            <div class="player" id="player">❤️</div>
        </div>
        <button id="game-start-btn" class="btn" onclick="startGame()">开始挑战</button>
    </div>
</div>

<!-- 步骤 5: 真心话轮盘 -->
<div id="step-wheel" class="hidden fade-in" style="width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh; flex-direction:column;">
    <div class="card">
        <h2 class="step-title">🎡 幸运大轮盘</h2>
        <p class="step-desc">转动轮盘，抽取董世帅给你的专属承诺！</p>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel"></div>
        </div>
        <div class="wheel-result" id="wheel-result"></div>
        <button id="wheel-btn" class="btn" onclick="spinWheel()">转动幸运</button>
        <button id="final-btn" class="btn hidden" onclick="showFinalGift()">🎁 领取最终大奖</button>
    </div>
</div>

<!-- 步骤 6: 最终礼物 -->
<div id="final-gift-modal">
    <h1 style="color:var(--primary); margin-bottom:20px; font-size:2.5rem;">生日快乐，康胜胜！</h1>
    <img src="" alt="Gift" class="gift-img" id="final-image">
    <p style="margin-top:30px; font-size:1.2rem; color:#555; max-width:600px; text-align:center;" id="final-message"></p>
    <button class="btn" onclick="location.reload()" style="margin-top:30px; background:#333;">再玩一次</button>
</div>

<script>
    // ================= 配置区域 (请在此修改) =================
    const CONFIG = {
        password: "115", // 解锁密码
        giftImage: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?q=80&w=1000&auto=format&fit=crop", // 【重要】替换为你的礼物图片链接
        finalMessage: "这份礼物代表我的心意，愿你的每一天都充满惊喜和爱！—— 爱你的董世帅",

        // 问答题库 (可以修改问题和答案)
        quizzes: [
            {
                q: "我们第一次见面是在哪里？",
                options: ["图书馆", "咖啡厅", "线上聊天", "朋友聚会"],
                answer: 2 // 索引，0代表第一个选项，以此类推
            },
            {
                q: "我最喜欢你叫我什么？",
                options: ["全名", "笨蛋", "亲爱的", "随便叫"],
                answer: 2
            },
            {
                q: "如果我要送你一样东西，你最希望是？",
                options: ["陪伴", "美食", "红包", "惊喜"],
                answer: 3
            }
        ],

        // 轮盘承诺语 (6段，对应6个颜色区域)
        wheelPrizes: [
            "无条件原谅一次券",
            "周末专属大厨服务",
            "清空购物车 (限额内)",
            "随叫随到陪聊服务",
            "一次说走就走的旅行计划",
            "永远爱你不变心"
        ]
    };
    // =======================================================

    // --- 全局逻辑 ---
    function nextStep(stepId) {
        document.querySelectorAll('body > div:not(#fireworks)').forEach(el => el.classList.add('hidden'));
        document.getElementById(stepId).classList.remove('hidden');
        document.getElementById(stepId).style.display = 'flex'; // 确保flex布局生效
        if(stepId === 'step-lock') {
            document.getElementById('step-lock').style.position = 'fixed';
        } else {
            document.getElementById('step-lock').style.position = 'absolute'; // 移开视线
        }
    }

    // 1. 解锁
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === CONFIG.password) {
            nextStep('step-cake');
            startFallingItems('❤️');
        } else {
            const err = document.getElementById('lock-error');
            err.style.display = 'block';
            document.querySelector('#step-lock .card').animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(10px)' },
                { transform: 'translateX(0)' }
            ], { duration: 400 });
        }
    }
    document.getElementById('passwordInput').addEventListener('keypress', e => { if(e.key==='Enter') checkPassword(); });

    // 2. 吹蜡烛
    function blowCandle() {
        const flame = document.getElementById('flame');
        if (!flame.classList.contains('out')) {
            flame.classList.add('out');
            document.getElementById('wish-text').classList.remove('hidden');
            document.getElementById('cake-btn').classList.remove('hidden');
            createFireworks(10); // 小烟花
        }
    }

    // 3. 问答逻辑
    let currentQuizIndex = 0;
    function loadQuiz() {
        if (currentQuizIndex >= CONFIG.quizzes.length) {
            nextStep('step-game');
            return;
        }
        const data = CONFIG.quizzes[currentQuizIndex];
        document.getElementById('quiz-question').innerText = `问题 ${currentQuizIndex+1}/${CONFIG.quizzes.length}: ${data.q}`;
        const optsDiv = document.getElementById('quiz-options');
        optsDiv.innerHTML = '';
        document.getElementById('quiz-feedback').innerText = '';

        data.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerText = opt;
            btn.onclick = () => {
                if (idx === data.answer) {
                    btn.classList.add('correct');
                    document.getElementById('quiz-feedback').innerText = "✅ 答对了！真棒！";
                    document.getElementById('quiz-feedback').style.color = "green";
                    setTimeout(() => {
                        currentQuizIndex++;
                        loadQuiz();
                    }, 1000);
                } else {
                    btn.classList.add('wrong');
                    document.getElementById('quiz-feedback').innerText = "❌ 不对哦，再想想？";
                    document.getElementById('quiz-feedback').style.color = "red";
                }
            };
            optsDiv.appendChild(btn);
        });
    }
    // 初始化问答
    // loadQuiz() 将在进入该步骤时调用，这里先预加载
    // 为了流程顺畅，我们在nextStep里手动触发或者在这里直接准备

    // 拦截 nextStep 以加载 Quiz
    const originalNextStep = nextStep;
    nextStep = function(stepId) {
        originalNextStep(stepId);
        if (stepId === 'step-quiz') loadQuiz();
    };

    // 4. 游戏逻辑 (简化版，确保稳定)
    let gameActive = false, score = 0, timeLeft = 30, gameLoopId, spawnId;
    let playerPos = 160;
    const gameContainer = document.getElementById('game-container');
    const player = document.getElementById('player');

    function startGame() {
        if (gameActive) return;
        gameActive = true;
        score = 0;
        timeLeft = 30;
        playerPos = 160;
        document.getElementById('score').innerText = '0';
        document.getElementById('timer').innerText = '30';
        document.getElementById('game-start-btn').disabled = true;
        document.getElementById('game-start-btn').innerText = "游戏中...";

        // 清理旧礼物
        document.querySelectorAll('.gift-item').forEach(e => e.remove());

        // 控制
        const movePlayer = (x) => {
            playerPos = Math.max(20, Math.min(300, x));
            player.style.left = playerPos + 'px';
        };

        // 键盘
        document.onkeydown = (e) => {
            if(!gameActive) return;
            if(e.key === 'ArrowLeft') movePlayer(playerPos - 20);
            if(e.key === 'ArrowRight') movePlayer(playerPos + 20);
        };

        // 触摸
        gameContainer.ontouchmove = (e) => {
            if(!gameActive) return;
            e.preventDefault();
            const rect = gameContainer.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            movePlayer(x);
        };

        // 生成礼物
        spawnId = setInterval(() => {
            if(!gameActive) return;
            const gift = document.createElement('div');
            gift.className = 'gift-item';
            gift.innerText = '🎁';
            gift.style.left = Math.random() * 280 + 20 + 'px';
            gift.style.top = '-30px';
            gameContainer.appendChild(gift);

            let top = -30;
            const speed = 3 + Math.random() * 2;

            const drop = () => {
                if(!gameActive) return;
                top += speed;
                gift.style.top = top + 'px';

                // 碰撞检测
                const pRect = player.getBoundingClientRect();
                const gRect = gift.getBoundingClientRect();

                if (top > 350) {
                    gift.remove();
                } else if (
                    gRect.bottom >= pRect.top + 10 &&
                    gRect.right >= pRect.left + 10 &&
                    gRect.left <= pRect.right - 10
                ) {
                    score++;
                    document.getElementById('score').innerText = score;
                    gift.remove();
                    if(score >= 10) endGame(true);
                } else {
                    requestAnimationFrame(drop);
                }
            };
            requestAnimationFrame(drop);
        }, 800);

        // 计时
        const timerInt = setInterval(() => {
            if(!gameActive) { clearInterval(timerInt); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(win) {
        gameActive = false;
        clearInterval(spawnId);
        document.onkeydown = null;
        gameContainer.ontouchmove = null;
        document.getElementById('game-start-btn').disabled = false;
        document.getElementById('game-start-btn').innerText = win ? "挑战成功!" : "再试一次";

        if(win) {
            createFireworks(30);
            setTimeout(() => nextStep('step-wheel'), 1500);
        } else {
            alert("时间到啦！没关系，再试一次就能通过~");
        }
    }

    // 5. 轮盘逻辑
    let wheelRotated = false;
    function spinWheel() {
        if(wheelRotated) return;
        wheelRotated = true;
        const wheel = document.getElementById('wheel');
        const randomDeg = 1800 + Math.random() * 360; // 至少转5圈
        wheel.style.transform = `rotate(${randomDeg}deg)`;

        setTimeout(() => {
            const actualDeg = randomDeg % 360;
            // 计算落在哪个区域 (每个区域60度)
            // 指针在上方 (0度)，旋转后，原本在下方的区域会转上来
            // 简单映射：360 - actualDeg
            const index = Math.floor(((360 - actualDeg + 30) % 360) / 60);
            const prize = CONFIG.wheelPrizes[index];

            document.getElementById('wheel-result').innerText = "🎉 获得：" + prize;
            document.getElementById('wheel-btn').classList.add('hidden');
            document.getElementById('final-btn').classList.remove('hidden');
            createFireworks(50);
        }, 4000);
    }

    // 6. 最终礼物
    function showFinalGift() {
        const modal = document.getElementById('final-gift-modal');
        document.getElementById('final-image').src = CONFIG.giftImage;
        document.getElementById('final-message').innerText = CONFIG.finalMessage;
        modal.classList.add('show');
        modal.style.display = 'flex';
        startFallingItems('🎉');
        setInterval(createFireworks, 800); // 持续烟花
    }

    // --- 特效工具 ---
    function startFallingItems(emoji) {
        setInterval(() => {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = 'falling-item';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = Math.random() * 20 + 10 + 'px';
            el.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }, 300);
    }

    // 简易烟花系统
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    function createFireworks(count = 30) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height / 2;
        const colors = ['#ff69b4', '#ffd700', '#00ffff', '#ff0000', '#ffffff'];

        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 100,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
    }

    function animateFireworks() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let i=particles.length-1; i>=0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2; // 重力
            p.life--;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 100;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
            ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(animateFireworks);
    }
    animateFireworks();
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

</script>
</body>
</html>
